<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
  <div class="form-grid">
    <div class="field">
      <label for="name" class="field__label">Nombre completo *</label>
      <input pInputText id="name" formControlName="name" placeholder="Juan Pérez" />
      @if (form.get('name')?.invalid && form.get('name')?.touched) {
        <small class="p-error">Nombre requerido (mínimo 3 caracteres)</small>
      }
    </div>

    <div class="field">
      <label for="id_number" class="field__label">Cédula</label>
      <input pInputText id="id_number" formControlName="id_number" placeholder="12345678" />
    </div>

    <div class="field">
      <label for="phone" class="field__label">Teléfono</label>
      <input pInputText id="phone" formControlName="phone" placeholder="300 123 4567" />
    </div>

    <div class="field">
      <label for="email" class="field__label">Email</label>
      <input pInputText id="email" formControlName="email" placeholder="juan@example.com" />
      @if (form.get('email')?.invalid && form.get('email')?.touched) {
        <small class="p-error">Email inválido</small>
      }
    </div>

    <div class="field field--full">
      <label for="address" class="field__label">Dirección</label>
      <textarea
        pTextarea
        id="address"
        formControlName="address"
        rows="3"
        placeholder="Calle 123 #45-67, Bogotá"
      ></textarea>
    </div>
  </div>

  <div class="form-actions">
    <p-button
      label="Cancelar"
      severity="secondary"
      outlined
      size="small"
      type="button"
      (onClick)="onCancel()"
    />
    <p-button
      label="Guardar"
      severity="primary"
      size="small"
      type="submit"
      [loading]="loading()"
      [disabled]="form.invalid"
    />
  </div>
</form>
