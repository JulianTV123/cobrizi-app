<div class="invoices">
  <div class="invoices__header">
    <h2>Cuentas de Cobro</h2>
    <p-button
      label="Nueva Cuenta"
      icon="pi pi-plus"
      severity="primary"
      size="small"
      (onClick)="openForm()"
    />
  </div>

  <p-table
    [value]="invoices()"
    [loading]="loading()"
    [rows]="10"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} cuentas"
    [rowsPerPageOptions]="[5, 10, 25]"
    [tableStyle]="{ 'min-width': '50rem' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 8rem">Acciones</th>
        <th>#</th>
        <th>Fecha</th>
        <th>Total</th>
        <th>Estado</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-invoice>
      <tr>
        <td>
          <div class="actions">
            @if (invoice.status === 'draft') {
              <p-button
                icon="pi pi-check"
                size="small"
                severity="success"
                text
                rounded
                pTooltip="Marcar como enviada"
                (onClick)="markAsSent(invoice)"
              />
            }
            <p-button
              icon="pi pi-download"
              size="small"
              severity="secondary"
              text
              rounded
              pTooltip="Descargar PDF"
              [loading]="downloadingId() === invoice.id"
              (onClick)="downloadPdf(invoice)"
            />
            <p-button
              icon="pi pi-send"
              size="small"
              severity="info"
              text
              rounded
              pTooltip="Enviar por email"
              [loading]="sendingId() === invoice.id"
              (onClick)="sendByEmail(invoice)"
            />
            <p-button
              icon="pi pi-trash"
              size="small"
              severity="danger"
              text
              rounded
              pTooltip="Eliminar"
              (onClick)="deleteInvoice(invoice)"
            />
          </div>
        </td>
        <td>
          <strong>#{{ invoice.consecutive }}</strong>
        </td>
        <td>{{ invoice.date | date: 'dd/MM/yyyy' }}</td>
        <td>
          <strong>{{ invoice.total | currency: 'COP' : 'symbol' : '1.0-0' }}</strong>
        </td>
        <td>
          <p-tag
            [value]="getStatusLabel(invoice.status)"
            [severity]="getStatusSeverity(invoice.status)"
          />
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center">No hay cuentas de cobro registradas.</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-confirmDialog key="invoiceDialog" />
