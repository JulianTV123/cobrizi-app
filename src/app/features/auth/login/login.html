<div class="login-container">
  <p-card header="Iniciar Sesión" class="login-card">
    @if (error(); as errorMsg) {
      <p-message severity="error" text="{{ errorMsg }}" />
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="p-field">
        <label for="email">Email</label>
        <input
          pInputText
          id="email"
          formControlName="email"
          [class.ng-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
        />
      </div>

      <div class="p-field">
        <label for="password">Contraseña</label>
        <input
          pInputText
          id="password"
          type="password"
          formControlName="password"
          [class.ng-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
        />
      </div>

      <p-button
        type="submit"
        label="Iniciar Sesión"
        icon="pi pi-sign-in"
        [loading]="loading()"
        [disabled]="form.invalid"
        styleClass="w-full"
      />
    </form>

    <div class="login-links">
      <a routerLink="/auth/register">¿No tienes cuenta? Regístrate</a>
    </div>
  </p-card>
</div>
