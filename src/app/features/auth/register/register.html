<div class="register-container">
  <p-card header="Crear cuenta" class="register-card">
    @if (error(); as errorMsg) {
      <p-message severity="error" [text]="errorMsg" />
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="register-grid">
        <div class="p-field">
          <label for="name">Nombre completo</label>
          <input
            pInputText
            id="name"
            formControlName="name"
            [class.ng-invalid]="form.get('name')?.invalid && form.get('name')?.touched"
          />
        </div>

        <div class="p-field">
          <label for="id_number">CC / NIT</label>
          <input
            pInputText
            id="id_number"
            formControlName="id_number"
            [class.ng-invalid]="form.get('id_number')?.invalid && form.get('id_number')?.touched"
          />
        </div>

        <div class="p-field full-width">
          <label for="address">Dirección</label>
          <input
            pInputText
            id="address"
            formControlName="address"
            [class.ng-invalid]="form.get('address')?.invalid && form.get('address')?.touched"
          />
        </div>

        <div class="p-field">
          <label for="phone">Teléfono</label>
          <input
            pInputText
            id="phone"
            formControlName="phone"
            [class.ng-invalid]="form.get('phone')?.invalid && form.get('phone')?.touched"
          />
        </div>

        <div class="p-field">
          <label for="email">Email</label>
          <input
            pInputText
            id="email"
            formControlName="email"
            [class.ng-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
          />
        </div>

        <div class="p-field">
          <label for="password">Contraseña</label>
          <input
            pInputText
            id="password"
            type="password"
            formControlName="password"
            [class.ng-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
          />
        </div>

        <div class="p-field">
          <label for="passwordConfirm">Confirmar contraseña</label>
          <input
            pInputText
            id="passwordConfirm"
            type="password"
            formControlName="passwordConfirm"
            [class.ng-invalid]="
              form.get('passwordConfirm')?.invalid && form.get('passwordConfirm')?.touched
            "
          />
        </div>
      </div>

      <p-button
        type="submit"
        label="Crear cuenta"
        icon="pi pi-user-plus"
        [loading]="loading()"
        [disabled]="form.invalid"
        styleClass="w-full"
      />
    </form>

    <div class="register-links">
      <a routerLink="/auth/login">¿Ya tienes cuenta? Inicia sesión</a>
    </div>
  </p-card>
</div>
