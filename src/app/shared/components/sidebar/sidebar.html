<aside class="sidebar" [class.sidebar--collapsed]="collapsed()">
  <div class="sidebar__brand">
    @if (!collapsed()) {
      <img src="assets/images/app-logo.png" alt="Cobrizi" class="sidebar__brand-logo" />
    } @else {
      <img src="assets/images/app-icon.png" alt="Cobrizi" class="sidebar__brand-logo--icon" />
    }
  </div>

  <nav class="sidebar__nav">
    @for (item of navItems; track item.route) {
      <a
        class="sidebar__nav-item"
        [routerLink]="item.route"
        routerLinkActive="sidebar__nav-item--active"
        (click)="onNavClick()"
      >
        <i [class]="item.icon"></i>
        @if (!collapsed()) {
          <span>{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <div class="sidebar__footer">
    <a
      class="sidebar__nav-item"
      routerLink="/profile"
      routerLinkActive="sidebar__nav-item--active"
      (click)="onNavClick()"
    >
      <i class="pi pi-user"></i>
      @if (!collapsed()) {
        <span>Mi perfil</span>
      }
    </a>
    <button class="sidebar__nav-item sidebar__logout" (click)="logout()">
      <i class="pi pi-sign-out"></i>
      @if (!collapsed()) {
        <span>Cerrar sesión</span>
      }
    </button>
    <div class="sidebar__nav-item">
      @if (!collapsed()) {
        <span> Cobrizi Version &nbsp;{{ version }} </span>
      }
    </div>
  </div>
</aside>
